<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W++ Token Analyzer | CS-310 Compiler Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080b14;
  --s1:      #0d1120;
  --s2:      #111828;
  --card:    #151d2e;
  --border:  #1e2a42;
  --border2: #263450;
  --text:    #cdd6f4;
  --muted:   #6c7a96;
  --accent:  #89b4fa;
  --green:   #a6e3a1;
  --yellow:  #f9e2af;
  --red:     #f38ba8;
  --mauve:   #cba6f7;
  --peach:   #fab387;
  --sky:     #89dceb;
  --teal:    #94e2d5;
  --overlay: rgba(137,180,250,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(137,180,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(137,180,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(8,11,20,0.9);
  backdrop-filter: blur(12px);
}

.logo-area { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #89b4fa, #cba6f7);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(137,180,250,0.3);
}
.logo-text h1 { font-size: 1.15rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
.logo-text p  { font-size: .72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.panel-header {
  padding: 20px 24px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title {
  font-size: .85rem; font-weight: 700;
  color: var(--text); text-transform: uppercase; letter-spacing: .1em;
  font-family: 'JetBrains Mono', monospace;
}

.file-zone {
  margin: 24px;
  padding: 40px;
  border: 2px dashed var(--border2);
  border-radius: 16px;
  text-align: center;
  cursor: pointer;
  background: var(--overlay);
  transition: all .3s ease;
}

.file-zone:hover {
  border-color: var(--accent);
  background: rgba(137,180,250,0.1);
  transform: translateY(-2px);
}

.file-zone i {
  font-size: 48px;
  color: var(--accent);
  margin-bottom: 16px;
  display: block;
}

.file-zone input { display: none; }
.file-zone h3 { font-size: 1.1rem; margin-bottom: 8px; color: #fff; }
.file-zone p { font-size: .9rem; color: var(--muted); }

.divider {
  display: flex;
  align-items: center;
  text-align: center;
  margin: 0 24px 24px;
  color: var(--muted);
  font-size: .75rem;
  font-family: 'JetBrains Mono', monospace;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  border-bottom: 1px solid var(--border);
}

.divider:not(:empty)::before { margin-right: 1.5em; }
.divider:not(:empty)::after { margin-left: 1.5em; }

.editor-wrap {
  padding: 0 24px 24px;
}

textarea {
  width: 100%;
  height: 300px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .9rem;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color .3s;
}

textarea:focus { border-color: var(--accent); }

.action-bar {
  padding: 16px 24px;
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

.btn {
  padding: 12px 24px;
  border-radius: 10px;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  transition: all .2s;
  border: none;
}

.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--overlay); color: var(--text); }

.btn-primary {
  background: linear-gradient(135deg, #89b4fa, #cba6f7);
  color: #080b14;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(137,180,250,0.4);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,11,20,0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: .1em; }

</style>
</head>
<body>

<header>
  <a href="index.html" class="logo-area">
    <div class="logo-icon">⚙</div>
    <div class="logo-text">
      <h1>W++ Token Analyzer</h1>
      <p>Compiler Construction · CS-310</p>
    </div>
  </a>
</header>

<div class="container">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Source Input</span>
      <button class="btn btn-ghost" onclick="loadSample()">Load Sample</button>
    </div>

    <div class="file-zone" onclick="document.getElementById('fInput').click()">
      <input type="file" id="fInput" accept=".wpp,.txt" onchange="handleFileUpload(event)">
      <i>📂</i>
      <h3>Upload W++ File</h3>
      <p>Drag and drop or click to browse (.wpp, .txt)</p>
    </div>

    <div class="divider">OR TYPE CODE MANUALLY</div>

    <div class="editor-wrap">
      <textarea id="codeEditor" spellcheck="false" placeholder="// Paste your W++ code here..."></textarea>
    </div>

    <div class="action-bar">
      <button class="btn btn-ghost" onclick="document.getElementById('codeEditor').value = ''">Clear</button>
      <button class="btn btn-primary" onclick="analyze()">Analyze & Generate Report →</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loading-text">TOKENIZING SOURCE...</div>
</div>

<script>
const API_BASE_URL = 'https://compiler-project-code.vercel.app';

async function analyze(filename = 'snippet.wpp') {
  const code = document.getElementById('codeEditor').value;
  if (!code.trim()) {
    alert('Please enter or upload code first.');
    return;
  }

  showLoader(true);

  try {
    const response = await fetch(`${API_BASE_URL}/analyze/code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, filename: filename })
    });

    if (!response.ok) throw new Error('Backend analysis failed');

    const data = await response.json();
    
    // Store results and original code in localStorage for the Result Page
    localStorage.setItem('analysisResult', JSON.stringify(data));
    localStorage.setItem('sourceCode', code);
    
    // Automatically proceed to result page
    window.location.href = 'Results.html';
  } catch (error) {
    alert('Error: ' + error.message);
    showLoader(false);
  }
}

async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const content = ev.target.result;
    document.getElementById('codeEditor').value = content;
    // Automatically analyze after upload as requested
    await analyze(file.name);
  };
  reader.readAsText(file);
}

function showLoader(show) {
  document.getElementById('loader').style.display = show ? 'flex' : 'none';
}

function loadSample() {
  document.getElementById('codeEditor').value = `// Sample W++ Code
int main() {
    int x = 10;
    if (x > 5) {
        print "Hello W++ World";
    }
    return 0;
}`;
}
</script>

</body>
</html>
