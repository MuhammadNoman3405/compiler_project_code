<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Results | W++ Token Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080b14;
  --s1:      #0d1120;
  --s2:      #111828;
  --card:    #151d2e;
  --border:  #1e2a42;
  --border2: #263450;
  --text:    #cdd6f4;
  --muted:   #6c7a96;
  --accent:  #89b4fa;
  --green:   #a6e3a1;
  --yellow:  #f9e2af;
  --red:     #f38ba8;
  --mauve:   #cba6f7;
  --peach:   #fab387;
  --sky:     #89dceb;
  --teal:    #94e2d5;
  
  /* token colors */
  --kw:   #cba6f7; /* Keywords */
  --id:   #89dceb; /* Identifiers */
  --con:  #fab387; /* Constants (Numbers) */
  --lit:  #f9e2af; /* Literals (Strings/Chars) */
  --op:   #89b4fa; /* Operators */
  --pun:  #a6e3a1; /* Punctuators */
  --spec: #f38ba8; /* Special Characters */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(137,180,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(137,180,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(8,11,20,0.9);
  backdrop-filter: blur(12px);
}

.logo-area { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; }
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #89b4fa, #cba6f7);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 { font-size: 1.15rem; font-weight: 800; color: #fff; }

.header-actions { display: flex; gap: 12px; }

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  transition: all .2s;
  border: none;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
.btn-outline:hover { background: rgba(255,255,255,0.05); }

.btn-primary { background: var(--accent); color: #080b14; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(137,180,250,0.3); }

.container {
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 24px;
}

/* ═══════════ SECTION CARDS ═══════════ */
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.section-header {
  padding: 20px 24px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-title {
  font-size: .8rem;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .15em;
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 2px;
}

.refresh-link {
  font-size: .7rem;
  color: var(--accent);
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background .2s;
}

.refresh-link:hover { background: rgba(137,180,250,0.1); }

.section-body {
  padding: 24px;
  flex: 1;
}

/* ═══════════ TABLES ═══════════ */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .8rem;
  font-family: 'JetBrains Mono', monospace;
}

th {
  background: rgba(255,255,255,0.02);
  text-align: left;
  padding: 12px 16px;
  color: var(--muted);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

tr:last-child td { border-bottom: none; }

.pill {
  padding: 2px 8px;
  border-radius: 6px;
  font-size: .7rem;
  font-weight: 700;
}

.stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
.stat-lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

.summary-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.stat-item {
  background: rgba(255,255,255,0.03);
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

.stream-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.token-chip {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: .75rem;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
.section-card:nth-child(1) { animation-delay: 0.1s; }
.section-card:nth-child(2) { animation-delay: 0.2s; }
.section-card:nth-child(3) { animation-delay: 0.3s; }
.section-card:nth-child(4) { animation-delay: 0.4s; }
.section-card:nth-child(5) { animation-delay: 0.5s; }
.section-card:nth-child(6) { animation-delay: 0.6s; }

</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">⚙</div>
    <div class="logo-text">
      <h1>Analysis Report</h1>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="window.print()">Print PDF</button>
    <a href="Analyze.html" class="btn btn-primary">Change Input File</a>
  </div>
</header>

<div class="container">
  <div class="results-grid" id="resultsGrid">
    <!-- Results will be injected here -->
  </div>
</div>

<div class="loading-overlay" id="fullLoader">
  <div style="font-size: 2rem; margin-bottom: 1rem;">⚙</div>
  <p style="font-family: 'JetBrains Mono', monospace; letter-spacing: .2em;">GENERATING REPORT...</p>
</div>

<script>
const API_BASE_URL = 'https://cc-scanner-backend.onrender.com';

document.addEventListener('DOMContentLoaded', () => {
  try {
    const resultData = localStorage.getItem('analysisResult');
    if (!resultData) {
      window.location.href = 'Analyze.html';
      return;
    }
    
    renderReport(JSON.parse(resultData));
  } catch (err) {
    console.error('Report Rendering Error:', err);
    alert('Failed to render report: ' + err.message);
  } finally {
    setTimeout(() => {
      document.getElementById('fullLoader').style.display = 'none';
    }, 800);
  }
});

async function refreshSection() {
  const code = localStorage.getItem('sourceCode');
  if (!code) return;
  
  document.getElementById('fullLoader').style.display = 'flex';
  
  try {
    const response = await fetch(`${API_BASE_URL}/analyze/code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, filename: 'input.wpp' })
    });
    const data = await response.json();
    localStorage.setItem('analysisResult', JSON.stringify(data));
    renderReport(data);
  } catch (e) {
    alert('Refresh failed: ' + e.message);
  } finally {
    document.getElementById('fullLoader').style.display = 'none';
  }
}

function renderReport(data) {
  try {
    const grid = document.getElementById('resultsGrid');
    if (!grid) return;
    grid.innerHTML = '';
  
    // 1. Token Type Summary Table (Requirement a)
    if (data.token_type_summary) {
      grid.appendChild(createSection('1. Token Type Summary', createTokenTypeSummaryTable(data.token_type_summary), true));
    }

    // 2. Line-wise Token Distribution (Requirement b)
    if (data.line_distribution) {
      grid.appendChild(createSection('2. Line-wise Token Distribution', createLineWiseTable(data.line_distribution), true));
    }

    // 3. Identifier Statistics (Requirement c)
    if (data.identifier_statistics) {
      grid.appendChild(createSection('3. Identifier Statistics', createIdentifierTable(data.identifier_statistics)));
    }

    // 4. Literal Statistics (Requirement d)
    if (data.literal_statistics) {
      grid.appendChild(createSection('4. Literal Statistics', createLiteralTable(data.literal_statistics)));
    }

    // 5. Token Summary Statistics (Requirement e / Overall Summary)
    if (data.overall_summary) {
      grid.appendChild(createSection('5. Token Summary Statistics', createDetailedSummary(data)));
    }

    // 6. Token Category Breakdown
    if (data.category_breakdown) {
      grid.appendChild(createSection('6. Token Category Breakdown', createCategoryBreakdown(data.category_breakdown)));
    }

    // 7. Unrecognized Tokens (New Section)
    const unrecognized = data.token_type_summary?.filter(t => t.category === 'UNRECOGNIZED');
    if (unrecognized && unrecognized.length > 0) {
      grid.appendChild(createSection('Unrecognized Tokens', createUnrecognizedTable(unrecognized)));
    }
    
    // 8. Token Stream (Visual)
    if (data.allTokens && data.allTokens.length > 0) {
      grid.appendChild(createSection('Token Stream (Visual)', createTokenStream(data.allTokens), true));
    }
  } catch (e) {
    console.error('Error in renderReport:', e);
    throw e;
  }
}

function createTokenTypeSummaryTable(summary) {
  let rows = summary.map(s => `
    <tr>
      <td><span class="pill" style="background:var(--${getColor(s.category)}); color:#000">${s.category}</span></td>
      <td>${s.type}</td>
      <td>${s.qty}</td>
      <td>${s.percentage}%</td>
      <td style="color:var(--muted); font-size: .7rem;">${s.lines.join(', ')}</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Category</th><th>Token Type</th><th>Qty</th><th>%</th><th>Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createLineWiseTable(dist) {
  let rows = dist.map(d => `
    <tr>
      <td>Line ${d.line}</td>
      <td><strong>${d.count}</strong> tokens</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Line Number</th><th>Total Tokens</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createIdentifierTable(stats) {
  let rows = stats.map(s => `
    <tr>
      <td style="color:var(--id)">${s.identifier}</td>
      <td>${s.frequency}</td>
      <td style="color:var(--muted); font-size: .7rem;">${s.lines.join(', ')}</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Identifier</th><th>Frequency</th><th>Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createLiteralTable(stats) {
  let rows = stats.map(s => `
    <tr>
      <td style="color:var(--lit)">${s.literal}</td>
      <td><small>${s.type}</small></td>
      <td>${s.frequency}</td>
      <td style="color:var(--muted); font-size: .7rem;">${s.lines.join(', ')}</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Literal</th><th>Type</th><th>Frequency</th><th>Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createUnrecognizedTable(unrecognized) {
  let rows = unrecognized.map(u => `
    <tr>
      <td style="color:var(--red)">${u.type}</td>
      <td>${u.qty}</td>
      <td style="color:var(--muted); font-size: .7rem;">${u.lines.join(', ')}</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Token</th><th>Qty</th><th>Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createDetailedSummary(data) {
  const s = data.overall_summary;
  return `
    <div style="font-family: 'JetBrains Mono', monospace; font-size: .85rem; line-height: 1.8;">
      <p>Total Tokens: <span style="color:var(--accent)">${data.total_tokens}</span></p>
      <p>Unique Token Types: <span style="color:var(--accent)">${s.unique_token_types}</span></p>
      <p>Total number of lines with code (excluding empty lines): <span style="color:var(--accent)">${data.lines_with_code}</span></p>
      <p>Empty/Ignored Lines: <span style="color:var(--accent)">${data.empty_lines}</span></p>
      <br>
      <p>Most Frequent Token: <span style="color:var(--green)">${s.most_frequent_token}</span></p>
      <p>Least Frequent Token: <span style="color:var(--red)">${s.least_frequent_token}</span></p>
      <br>
      <p>Average Tokens per Line: <span style="color:var(--yellow)">${s.average_tokens_per_line}</span></p>
      <p>Maximum Tokens in a Single Line: <span style="color:var(--accent)">${s.max_tokens_line.count} (Line ${s.max_tokens_line.line})</span></p>
      <p>Minimum Tokens in a Single Line: <span style="color:var(--accent)">${s.min_tokens_line.count} (Line ${s.min_tokens_line.line})</span></p>
    </div>
  `;
}

function createCategoryBreakdown(breakdown) {
  let rows = breakdown.map(c => `
    <tr>
      <td><span class="pill" style="background:var(--${getColor(c.category)}); color:#000">${c.category}</span></td>
      <td><strong>${c.total}</strong></td>
      <td>${c.percentage}%</td>
    </tr>
  `).join('');
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Category</th><th>Total</th><th>Percentage</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function createTokenStream(tokens) {
  let chips = tokens.map(t => `
    <span class="token-chip" style="border-left: 3px solid var(--${getColor(t.category)})" title="Line ${t.line}">
      ${t.value}
    </span>
  `).join('');
  return `<div class="stream-wrap">${chips}</div>`;
}

function getColor(cat) {
  return { 
    KEYWORD: 'kw', 
    IDENTIFIER: 'id', 
    OPERATOR: 'op', 
    SEPARATOR: 'pun', 
    LITERAL: 'lit', 
    COMMENT: 'green',
    UNRECOGNIZED: 'red'
  }[cat] || 'muted';
}


function createSection(title, content, fullWidth = false) {
  const card = document.createElement('div');
  card.className = 'section-card';
  if (fullWidth) card.style.gridColumn = '1 / -1';
  card.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">${title}</h2>
      <a href="#" class="refresh-link" onclick="refreshSection(); return false;">↻ Refresh</a>
    </div>
    <div class="section-body">
      ${content}
    </div>
  `;
  return card;
}

function sum(obj) { 
  if (!obj) return 0;
  return Object.values(obj).reduce((a, b) => a + b, 0); 
}

function sumLiterals(l) {
  if (!l) return 0;
  return sum(l.strings?.counts) + sum(l.integers?.counts) + sum(l.floats?.counts) + sum(l.chars?.counts);
}
</script>

</body>
</html>
